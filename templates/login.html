{% extends 'base.html' %}
{% block title %}Login — LoopBack{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Login</h1>
  <div class="form-card">
    <form method="post">
      <label>Email</label>
      <input type="email" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit" class="btn-primary-sm">Log In</button>
    </form>
    <p>New here? <a href="{{ url_for('auth.signup') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
